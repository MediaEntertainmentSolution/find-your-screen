<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Find Your TV Personality</title>
    <style>
      @font-face {
        font-family: "LGSmart";
        src:
          url("LGSmartRegular.woff2") format("woff2"),
          url("LGSmartRegular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
      }

      body {
        font-family: "LGSmart", sans-serif;
      }

      :root {
        --cream: #faf8f4;
        --white: #ffffff;
        --charcoal: #1a1a1a;
        --mid: #6b6b6b;
        --red: #ee2929;
        --red-light: #ffe8ec;
        --border: #e8e4dc;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100vh;
        margin: 0 auto;
        background: var(--cream);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .screen {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        background: var(--cream);
      }
      .screen.active {
        display: flex;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* IDLE */
      #idle-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.88);
        z-index: 200;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
      }
      #idle-overlay.visible {
        display: flex;
      }
      .idle-num {
        font-size: 88px;
        font-weight: 800;
        color: var(--red);
        line-height: 1;
        margin-bottom: 16px;
      }
      .idle-msg {
        font-size: 16px;
        color: #bbb;
        margin-bottom: 32px;
        line-height: 1.7;
      }
      .idle-keep {
        background: var(--white);
        color: var(--charcoal);
        border: none;
        border-radius: 12px;
        padding: 14px 32px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }

      /* INTRO */
      #screen-intro {
        background: rgba(250, 248, 244, 0.85);
        backdrop-filter: blur(6px);
        color: var(--charcoal);
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px 32px;
        cursor: pointer;
      }
      .intro-logo {
        font-size: 30px;
        font-weight: 800;
        color: var(--red);
        margin-bottom: 44px;
      }
      .lg-logo {
        height: 40px;
        width: auto;
        margin-bottom: 104px;
      }
      .intro-title {
        font-size: 60px;
        font-weight: 300;
        color: var(--charcoal);
        line-height: 1.2;
        margin-bottom: 12px;
      }
      .intro-title strong {
        font-weight: 700;
        color: var(--red);
        display: block;
      }
      .intro-sub {
        font-size: 25px;
        color: var(--mid);
        margin-bottom: 44px;
        line-height: 1.2;
      }
      .intro-pills {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;

        justify-content: center;
        margin-bottom: 44px;
      }
      .intro-pill {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 99px;
        padding: 7px 14px;
        font-size: 20px;
        color: var(--charcoal);
      }
      .intro-cta {
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 14px;
        padding: 18px 48px;
        font-size: 25px;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 6px 24px rgba(200, 16, 46, 0.35);
      }
      .intro-tap {
        font-size: 20px;
        color: #444;
        margin-top: 14px;
      }
      .disclaimer {
        font-size: 14px;
        color: grey;
        margin-top: 20px;
      }

      /* QUIZ HEADER */
      .quiz-header {
        background: var(--cream);
        padding-left: 80px;
        padding-right: 80px;
        padding-top: 5px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
      }
      .hdr-logo {
        height: 60%;
        width: auto;
        margin-bottom: 5px;
      }
      .hdr-logo img {
        height: 90%;
        width: auto;
      }
      .hdr-axis {
        font-size: 20px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--mid);
      }
      .hdr-home {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 15px;
        font-size: 22px;
        color: var(--mid);
        cursor: pointer;
      }
      .hdr-home:active {
        border-color: var(--red);
        color: var(--red);
      }
      .progress-bar {
        height: 3px;
        background: #eaeaea;
        flex-shrink: 0;
      }
      .progress-fill {
        height: 100%;
        background: var(--red);
        transition: width 0.3s ease;
      }

      /* QUIZ BODY */
      #screen-quiz {
        overflow-y: auto;
      }
      .quiz-body {
        min-height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 200px 200px 200px;
        transition:
          transform 0.25s ease,
          opacity 0.25s ease;
      }
      .quiz-body.fade-out {
        opacity: 0;
        transform: translateY(-10px);
      }
      .q-num {
        font-size: 20px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--red);
        margin-bottom: 10px;
      }
      .q-text {
        font-size: 30px;
        font-weight: 500;
        color: var(--charcoal);
        line-height: 1.5;
        margin-bottom: 40px;
      }

      /* SCALE */
      .scale-labels {
        display: flex;
        justify-content: space-between;
        font-size: 20px;
        color: var(--mid);
        font-weight: 500;
        margin-bottom: 12px;
        padding: 0 2px;
      }
      .scale-btns {
        display: flex;
        gap: 20px;
        margin-top: 8px;

        justify-content: center;
      }
      .scale-btn {
        flex: 1;

        height: 102px;
        border-radius: 14px;
        border: 2px solid var(--border);
        background: rgba(255, 255, 255, 0.5); /* adjust 0.6–0.9 */
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        transition: all 0.15s;
      }
      .scale-btn .snum {
        font-size: 36px;
        font-weight: 700;
        color: var(--charcoal);
      }
      .scale-btn .sword {
        font-size: 15px;
        opacity: 0.7;
        color: var(--mid);
        text-align: center;
        line-height: 1.2;
      }
      .scale-btn:active {
        transform: scale(0.93);
      }
      .scale-btn[data-val="4"].picked {
        background: #f1f8e9;
        border-color: #4caf50;
      }
      .scale-btn[data-val="4"].picked .snum {
        color: #4caf50;
      }
      .scale-btn[data-val="3"].picked {
        background: #f5f5f5;
        border-color: #9e9e9e;
      }
      .scale-btn[data-val="3"].picked .snum {
        color: #9e9e9e;
      }
      .scale-btn[data-val="2"].picked {
        background: #fff3e0;
        border-color: #e57373;
      }
      .scale-btn[data-val="2"].picked .snum {
        color: #e57373;
      }
      .scale-btn[data-val="1"].picked {
        background: #ffebee;
        border-color: #c62828;
      }
      .scale-btn[data-val="1"].picked .snum {
        color: #c62828;
      }
      .scale-btn[data-val="5"].picked {
        background: #e8f5e9;
        border-color: #1a6b3c;
      }
      .scale-btn[data-val="5"].picked .snum {
        color: #1a6b3c;
      }

      /* SIZE Q */
      .size-btns {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .size-btn {
        background: rgba(255, 255, 255, 0.5); /* adjust 0.6–0.9 */
        border: 2px solid var(--border);
        border-radius: 14px;
        padding: 15px 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        text-align: left;
        transition: all 0.15s;
      }
      .size-btn:active {
        border-color: var(--red);
        background: var(--red-light);
      }
      .size-icon {
        font-size: 30px;
        min-width: 28px;
        padding-left: 50px;
        text-align: center;
      }
      .size-label {
        font-size: 25px;
        font-weight: 600;
        padding-left: 70px;
        color: var(--charcoal);
      }
      .size-sub {
        font-size: 18px;
        color: var(--mid);
        padding-left: 70px;
        margin-top: 2px;
      }

      /* RESULT */
      #screen-result {
        overflow-y: auto;
      }
      .result-hdr {
        background: var(--cream);
        padding-left: 80px;
        padding-right: 80px;
        padding-top: 5px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
      }

      .result-hdr-logo {
        height: 60%;
        width: auto;
        margin-bottom: 5px;
      }
      .result-hdr-logo img {
        height: 90%;
        width: auto;
      }

      .result-hdr-home {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 15px;
        font-size: 22px;
        color: #888;
        cursor: pointer;
      }

      .result-hdr-home:active {
        border-color: var(--red);
        color: var(--red);
      }
      .result-body {
        padding-left: 250px;
        padding-right: 250px;
        padding-top: 0;
        padding-bottom: 0;
      }

      .result-name {
        font-size: 35px;
        padding-top: 20px;
        font-weight: 700;
        color: var(--charcoal);
        line-height: 1.2;
        margin-bottom: 6px;
      }
      .result-oneliner {
        font-size: 20px;
        font-style: italic;
        color: var(--mid);
        line-height: 1.55;
        margin-bottom: 22px;
      }
      .result-story {
        font-size: 20px;
        color: var(--charcoal);
        line-height: 1.72;
        margin-bottom: 28px;
      }
      .rec-card {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 80%;
        width: auto;
        padding-left: 0px;
        padding-right: 40px;
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        margin-bottom: 20px;
      }
      .rec-img {
        padding-left: 50px;
        padding-right: 50px;
        padding-top: 0;
        padding-bottom: 0px;
        width: 100%;

        aspect-ratio: 16/9;
        background-color: var(--white);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 25px;
        letter-spacing: 0.05em;
      }
      .rec-content {
        padding: 5px;
      }
      .rec-label {
        font-size: 20px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--red);
        margin-bottom: 6px;
      }
      .rec-model {
        font-size: 30px;
        font-weight: 700;
        color: var(--charcoal);
        margin-bottom: 10px;
      }
      .rec-text {
        font-size: 18px;
        color: var(--mid);
        line-height: 1.65;
      }
      .btn-retake {
        width: 100%;
        background: rgba(255, 255, 255, 0.8); /* adjust 0.6–0.9 */
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        font-size: 14px;
        font-weight: 500;
        color: var(--mid);
        cursor: pointer;
      }
      .btn-retake:active {
        border-color: var(--red);
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="idle-overlay">
        <div class="idle-num" id="idleNum">10</div>
        <div class="idle-msg">
          Still there?<br />Returning to start shortly...
        </div>
        <button class="idle-keep" onclick="resetIdle()">Keep going</button>
      </div>

      <div class="screen active" id="screen-intro">
        <div class="lg-logo"><img src="Images/lg-logo.png" alt="LG" /></div>
        <div class="intro-title">
          <bold>Find your </bold> <strong>TV personality</strong>
        </div>
        <div class="intro-sub">
          12 quick questions.<br />The LG screen made for you.
        </div>
        <div class="intro-pills">
          <div class="intro-pill">🎬 Cinema lover?</div>
          <div class="intro-pill">🎮 Hardcore gamer?</div>
          <div class="intro-pill">🖼️ Design nerd?</div>
          <div class="intro-pill">📺 Everyday viewer?</div>
        </div>
        <button class="intro-cta" onclick="startQuiz()">Find Out →</button>

        <div class="disclaimer">
          <i>Not a real personality test. Very real TVs though.</i>
        </div>
      </div>

      <div class="screen" id="screen-quiz">
        <div class="quiz-header">
          <div class="hdr-logo"><img src="Images/lg-logo.png" alt="LG" /></div>
          <div class="hdr-axis" id="hdrAxis">TV Appearance</div>
          <button class="hdr-home" onclick="goHome()">⌂ Home</button>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="quiz-body" id="quizBody"></div>
      </div>

      <div class="screen" id="screen-result">
        <div class="result-hdr">
          <div class="result-hdr-logo">
            <img src="Images/lg-logo.png" alt="LG" />
          </div>
          <button class="result-hdr-home" onclick="goHome()">⌂ Home</button>
        </div>
        <div class="result-body" id="resultBody"></div>
      </div>
    </div>

      // ═══════════════════════════════════
      // STATE
      // ═══════════════════════════════════
      let curQ = 0;
      let answers = {};
      let isSBM2 = false;
      let idleTimer = null;
      let countdownTimer = null;
      let idleSeconds = 0;

      // ═══════════════════════════════════
      // IDLE TIMER — 60s background, 10s countdown
      // ═══════════════════════════════════
      function startIdle() {
        clearTimeout(idleTimer);
        clearInterval(countdownTimer);
        document.getElementById("idle-overlay").classList.remove("visible");
        idleTimer = setTimeout(() => {
          showIdleCountdown();
        }, 60000);
      }

      function showIdleCountdown() {
        idleSeconds = 10;
        document.getElementById("idleNum").textContent = idleSeconds;
        document.getElementById("idle-overlay").classList.add("visible");
        countdownTimer = setInterval(() => {
          idleSeconds--;
          document.getElementById("idleNum").textContent = idleSeconds;
          if (idleSeconds <= 0) {
            clearInterval(countdownTimer);
            goHome();
          }
        }, 1000);
      }

      function resetIdle() {
        clearInterval(countdownTimer);
        document.getElementById("idle-overlay").classList.remove("visible");
        startIdle();
      }

      function stopIdle() {
        clearTimeout(idleTimer);
        clearInterval(countdownTimer);
        document.getElementById("idle-overlay").classList.remove("visible");
      }

      // Reset idle on any interaction
      document.addEventListener("click", () => {
        if (
          document.getElementById("screen-intro").classList.contains("active")
        )
          return;
        startIdle();
      });
      document.addEventListener("touchstart", () => {
        if (
          document.getElementById("screen-intro").classList.contains("active")
        )
          return;
        startIdle();
      });

      // ═══════════════════════════════════
      // NAVIGATION
      // ═══════════════════════════════════
      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        window.scrollTo(0, 0);
      }

      function goHome() {
        stopIdle();
        curQ = 0;
        answers = {};
        isSBM2 = false;
        showScreen("screen-intro");
      }

      function startQuiz() {
        curQ = 0;
        answers = {};
        isSBM2 = false;
        showScreen("screen-quiz");
        renderQ();
        startIdle();
      }

      // ═══════════════════════════════════
      // RENDER QUESTION
      // ═══════════════════════════════════
      function renderQ() {
        document.getElementById("quizBody").classList.remove("fade-out");
        const pct = Math.round((curQ / (isSBM2 ? 12 : 13)) * 100);
        document.getElementById("progressFill").style.width = pct + "%";

        // Q13 — size
        if (curQ === 12) {
          document.getElementById("hdrAxis").textContent = "Bonus Question";
          let html = `<div class="q-num">Bonus Question</div>
      <div class="q-text">What screen size are you thinking of for your space?</div>
      <div class="size-btns">`;
          SIZES.forEach((s) => {
            html += `<button class="size-btn" onclick="pickSize(${s.val})">
        <span class="size-icon">${s.icon}</span>
        <div><div class="size-label">${s.label}</div><div class="size-sub">${s.sub}</div></div>
      </button>`;
          });
          html += "</div>";
          document.getElementById("quizBody").innerHTML = html;
          return;
        }

        const q = QS[curQ];
        document.getElementById("hdrAxis").textContent = q.label;
        const picked = answers[q.id];

        let html = `<div class="q-num">Question ${q.id} of 12</div>
    <div class="q-text">${q.text}</div>
    <div class="scale-labels"><span>${q.disagree}</span><span>${q.agree}</span></div>
    <div class="scale-btns">`;

        SCALE.forEach((s) => {
          const cls = picked === s.val ? "scale-btn picked" : "scale-btn";
          const words = s.word.replace("\n", "<br>");
          html += `<button class="${cls}" data-val="${s.val}" onclick="pickScale(${s.val})">
      <span class="snum">${s.val}</span><span class="sword">${words}</span>
    </button>`;
        });

        html += "</div>";
        document.getElementById("quizBody").innerHTML = html;
      }

      function pickScale(val) {
        document
          .querySelectorAll(".scale-btn")
          .forEach((b) => (b.disabled = true));

        answers[QS[curQ].id] = val;
        startIdle();

        let body = document.getElementById("quizBody");
        body.classList.add("fade-out");

        setTimeout(() => {
          curQ++;
          if (curQ === 12) {
            // Check if SBM2 before showing Q13
            const code = calcCode();
            if (code === "SBM2") {
              isSBM2 = true;
              showResult("SBM2", 0);
              return;
            }
          }
          if (curQ >= 13) {
            showResult(calcCode(), 0);
            return;
          }
          renderQ();
          window.scrollTo(0, 0);
          body.classList.remove("fade-out");
        }, 220);
      }

      function pickSize(val) {
        answers[QS[curQ].id] = val;
        startIdle();

        let body = document.getElementById("quizBody");
        body.classList.add("fade-out");

        setTimeout(() => {
          curQ++;
          if (curQ === 12) {
            const code = calcCode();
            if (code === "SBM2") {
              isSBM2 = true;
              showResult("SBM2", 0);
              return;
            }
          }
          if (curQ >= 13) {
            showResult(calcCode(), 0);
            return;
          }
          renderQ();
          window.scrollTo(0, 0);
          body.classList.remove("fade-out");
        }, 220);
      }

      function pickSize(val) {
        document.getElementById("quizBody").classList.remove("fade-out"); // added this ****
        startIdle();
        showResult(calcCode(), val);
      }

      // ═══════════════════════════════════
      // SCORING
      // ═══════════════════════════════════
      function calcCode() {
        // Axis 1 — Appearance (D/P): Q1→P, Q2→D(flip), Q3→P. ≥9 = P
        const a1 = answers[1] + (6 - answers[2]) + answers[3];
        const appear = a1 >= 9 ? "P" : "D";

        // Axis 2 — Usage (C/G/E): highest of Q4/Q5/Q6. Tie within 1 → E
        const c = answers[4],
          g = answers[5],
          e = answers[6];
        const all3 = c === 3 && g === 3 && e === 3;
        const sorted = [
          { l: "C", s: c },
          { l: "G", s: g },
          { l: "E", s: e },
        ].sort((a, b) => b.s - a.s);
        const usage =
          all3 || sorted[0].s - sorted[1].s <= 1 ? "E" : sorted[0].l;

        // Axis 3 — Budget (L/R): Q7→L, Q8 & Q9 flip. ≥9 = L
        const a3 = answers[7] + (6 - answers[8]) + (6 - answers[9]);
        const budget = a3 >= 9 ? "L" : "R";

        // Axis 4 — Decor (S/U): Q10→S, Q11 flip, Q12→S. ≥9 = S
        const a4 = answers[10] + (6 - answers[11]) + answers[12];
        const decor = a4 >= 9 ? "S" : "U";

        // SBM2 — all 4 axes dead centre
        if (a1 === 9 && all3 && a3 === 9 && a4 === 9) return "SBM2";

        return appear + usage + budget + decor;
      }

      // ═══════════════════════════════════
      // SHOW RESULT
      // ═══════════════════════════════════
      function showResult(code, size) {
        const arch = A[code] || A["SBM2"];
        const sizeData = arch.sizes[size] || arch.sizes[0];

        document.getElementById("resultBody").innerHTML = `
    <div class="result-name">${arch.name}</div>
    <div class="result-oneliner">${arch.oneliner}</div>
    <div class="result-story">${arch.story}</div>
    <div class="rec-card">
      <div class="rec-img"><img src="Images/${sizeData.tvImg}" style="width:100%;height:100%;object-fit:contain;"></div>
      <div class="rec-content">
        <div class="rec-label">Your Screen</div>
        <div class="rec-model">${sizeData.tv}</div>
        <div class="rec-text">${sizeData.rec}</div>
      </div>
    </div>
    <button class="btn-retake" onclick="goHome()">↺ Start Over</button>
  `;

        showScreen("screen-result");
      }
    </script>
